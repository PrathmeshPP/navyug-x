<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health & Robotics IoT Dashboard</title>
    <style>
        /* === CSS Styling === */
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --success: #22c55e;
            --warning: #eab308;
            --danger: #ef4444;
            --glass-border: rgba(255, 255, 255, 0.1);
            --font-family: 'Inter', -apple-system, sans-serif;
        }

        body {
            margin: 0;
            font-family: var(--font-family);
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }

        #app {
            width: 100%;
            max-width: 1200px;
            min-height: 80vh;
        }

        /* Glassmorphism utility */
        .glass-panel {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 2rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        /* Typography */
        h1,
        h2,
        h3 {
            margin-top: 0;
        }

        h2 {
            font-size: 1.8rem;
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .text-center {
            text-align: center;
        }

        /* Auth Container */
        .auth-container {
            max-width: 400px;
            margin: auto;
        }

        .input-group {
            margin-bottom: 1rem;
        }

        .input-group input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 8px;
            border: 1px solid var(--glass-border);
            background: rgba(0, 0, 0, 0.2);
            color: white;
            font-size: 1rem;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            background: var(--accent);
            color: #fff;
            cursor: pointer;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.2s ease;
        }

        .btn:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
        }

        .btn:active {
            transform: translateY(1px);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            margin-top: 10px;
        }

        .btn-outline:hover {
            background: rgba(59, 130, 246, 0.1);
        }

        .error-msg {
            color: var(--danger);
            font-size: 0.9rem;
            text-align: center;
            margin-top: 10px;
            min-height: 20px;
        }

        /* Dashboard Layout */
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .btn-logout {
            width: auto;
            padding: 8px 16px;
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid var(--danger);
            color: var(--danger);
        }

        .btn-logout:hover {
            background: var(--danger);
            color: white;
        }

        /* Alerts */
        .alert-banner {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid var(--danger);
            color: #fca5a5;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 2rem;
            text-align: center;
            font-weight: bold;
            display: none;
            animation: pulse-border 2s infinite;
        }

        @keyframes pulse-border {
            0% {
                box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4);
            }

            70% {
                box-shadow: 0 0 0 10px rgba(239, 68, 68, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(239, 68, 68, 0);
            }
        }

        .alert-banner.active {
            display: block;
        }

        /* Sensor Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .sensor-card {
            text-align: center;
            transition: transform 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .sensor-card:hover {
            transform: translateY(-5px);
        }

        .sensor-icon {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .sensor-name {
            color: var(--text-muted);
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        .sensor-value-container {
            display: flex;
            justify-content: center;
            align-items: baseline;
            gap: 0.25rem;
            margin: 1rem 0;
        }

        .sensor-value {
            font-size: 3rem;
            font-weight: 700;
            line-height: 1;
        }

        .sensor-unit {
            font-size: 1.2rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .status-normal {
            background: rgba(34, 197, 94, 0.15);
            color: var(--success);
        }

        .status-danger {
            background: rgba(239, 68, 68, 0.15);
            color: var(--danger);
            animation: soft-pulse 1s infinite alternate;
        }

        /* Loading / not-yet-connected state */
        .status-loading {
            background: rgba(148, 163, 184, 0.15);
            color: var(--text-muted);
        }

        /* Dim the '--' placeholder value while waiting for sensor data */
        .value-loading {
            color: var(--text-muted);
            font-size: 2rem;
            letter-spacing: 4px;
        }

        @keyframes soft-pulse {
            from {
                background: rgba(239, 68, 68, 0.15);
            }

            to {
                background: rgba(239, 68, 68, 0.3);
            }
        }

        /* Robot Control Section */
        .robot-control {
            text-align: center;
        }

        .btn-robot {
            font-size: 1.5rem;
            padding: 1.5rem 3rem;
            border-radius: 50px;
            background: linear-gradient(135deg, var(--warning), #ca8a04);
            color: #000;
            box-shadow: 0 10px 25px rgba(234, 179, 8, 0.4);
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .btn-robot:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 35px rgba(234, 179, 8, 0.6);
        }

        .btn-robot.active {
            background: linear-gradient(135deg, var(--success), #16a34a);
            color: white;
            box-shadow: 0 10px 25px rgba(34, 197, 94, 0.4);
            cursor: default;
            transform: none;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .dashboard-header {
                flex-direction: column;
                text-align: center;
            }

            .btn-robot {
                width: 100%;
                padding: 1rem;
                font-size: 1.2rem;
            }
        }
    </style>
</head>

<body>

    <div id="app">
        <!-- Content injected by JavaScript -->
    </div>

    <!-- === JavaScript Logic === -->
    <script type="module">
        // Import Firebase SDKs
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        // ==========================================
        // LOCAL SERVER CONFIGURATION
        // ==========================================
        // The dashboard expects your Python server to be running here:
        const API_URL = "http://127.0.0.1:5000/api";

        // ==========================================
        // SENSOR THRESHOLDS (Easily changeable)
        // ==========================================
        const THRESHOLDS = {
            heartRate: { min: 60, max: 100 },      // BPM
            temperature: { min: 36.0, max: 37.8 }, // Celsius (internal/patient)
            spO2: { min: 95, max: 100 },           // Percentage
            waterLevel: { min: 10, max: 100 },     // Percentage (<10 is critically low)
            ambientTemp: { min: 10.0, max: 40.0 }, // Celsius (room)
            ambientHumidity: { min: 30, max: 70 }  // Percentage (room)
        };

        const appDiv = document.getElementById('app');

        let sensorData = { heartRate: null, temperature: null, spO2: null, waterLevel: null, ambientTemp: null, ambientHumidity: null };
        let dataReceived = false;
        let robotCalled = false;
        let pollInterval = null;

        // ==========================================
        // UI RENDERING: MAIN DASHBOARD
        // ==========================================
        function renderDashboard() {
            appDiv.innerHTML = `
                <div class="dashboard-header">
                    <div>
                        <h2 style="margin:0; text-align:left;">Health Monitor & Robotics</h2>
                        <span class="text-muted">Live Patient Data</span>
                    </div>
                </div>

                <div class="alert-banner" id="globalAlert">
                    ⚠️ CRITICAL ALERT: Abnormal health reading detected. Robot car has been dispatched.
                </div>
                
                <div class="grid" id="sensorsGrid">
                    <!-- Sensor Cards injected dynamically -->
                </div>

                <div class="glass-panel robot-control">
                    <h3 style="margin-bottom: 0.5rem;">Manual Assistive Control</h3>
                    <p class="text-muted" style="margin-bottom: 1.5rem;">Summon the autonomous robotic assistant to your location.</p>
                    <button class="btn-robot" id="callRobotBtn">🚨 Bring Car To Me</button>
                    <div id="apiErrorMsg" style="color:var(--danger); margin-top:10px; font-size: 0.9em; display:none;">Server Disconnected. Retrying...</div>
                </div>
            `;

            document.getElementById('callRobotBtn').addEventListener('click', () => callRobot(true));
            updateDashboardUI();
        }

        // ==========================================
        // LOGIC: SENSOR EVALUATION & ALERTS
        // ==========================================
        function checkValueStatus(value, thresholds) {
            if (value === null || value === undefined) return 'loading';
            if (value < thresholds.min || value > thresholds.max) return 'danger';
            return 'normal';
        }

        function formatValue(value, decimals = 0) {
            if (value === null || value === undefined) return '--';
            return decimals > 0 ? value.toFixed(decimals) : Math.round(value);
        }

        async function callRobot(manual = false) {
            if (!robotCalled) {
                robotCalled = true;

                // POST to local server telling the car to come
                try {
                    await fetch(`${API_URL}/car/command`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ command: 'CALL' })
                    });
                } catch (e) {
                    console.error("Failed to send call command", e);
                }

                const btn = document.getElementById('callRobotBtn');
                if (btn) {
                    btn.classList.add('active');
                    btn.innerHTML = '✅ Robot En Route';
                    btn.disabled = true;
                }

                if (!manual) {
                    const alertBanner = document.getElementById('globalAlert');
                    if (alertBanner) alertBanner.classList.add('active');
                }
            }
        }

        function updateDashboardUI() {
            const grid = document.getElementById('sensorsGrid');
            if (!grid) return;

            const hrStatus = checkValueStatus(sensorData.heartRate, THRESHOLDS.heartRate);
            const tempStatus = checkValueStatus(sensorData.temperature, THRESHOLDS.temperature);
            const spo2Status = checkValueStatus(sensorData.spO2, THRESHOLDS.spO2);
            const waterStatus = checkValueStatus(sensorData.waterLevel, THRESHOLDS.waterLevel);
            const ambTempStatus = checkValueStatus(sensorData.ambientTemp, THRESHOLDS.ambientTemp);
            const ambHumStatus = checkValueStatus(sensorData.ambientHumidity, THRESHOLDS.ambientHumidity);

            const isEmergency = dataReceived &&
                [hrStatus, tempStatus, spo2Status, waterStatus, ambTempStatus, ambHumStatus].includes('danger');

            if (isEmergency && !robotCalled) {
                callRobot(false);
            }

            const cards = [
                { title: 'Heart Rate', value: formatValue(sensorData.heartRate), unit: 'BPM', status: hrStatus, icon: '❤️' },
                { title: 'Body Temp', value: formatValue(sensorData.temperature, 1), unit: '°C', status: tempStatus, icon: '🌡️' },
                { title: 'Blood Oxygen', value: formatValue(sensorData.spO2), unit: '%', status: spo2Status, icon: '🩸' },
                { title: 'Water Level', value: formatValue(sensorData.waterLevel), unit: '%', status: waterStatus, icon: '💧' },
                { title: 'Room Temp', value: formatValue(sensorData.ambientTemp, 1), unit: '°C', status: ambTempStatus, icon: '🏠' },
                { title: 'Room Humidity', value: formatValue(sensorData.ambientHumidity), unit: '%', status: ambHumStatus, icon: '🌫️' }
            ];

            grid.innerHTML = cards.map(c => {
                const isLoading = c.status === 'loading';
                const badgeClass = isLoading ? 'status-loading' : (c.status === 'danger' ? 'status-danger' : 'status-normal');
                const badgeText = isLoading ? 'Connecting...' : (c.status === 'danger' ? 'Abnormal' : 'Normal');
                return `
                <div class="glass-panel sensor-card">
                    <div class="sensor-icon">${c.icon}</div>
                    <div class="sensor-name">${c.title}</div>
                    <div class="sensor-value-container">
                        <span class="sensor-value ${isLoading ? 'value-loading' : ''}">${c.value}</span>
                        <span class="sensor-unit">${isLoading ? '' : c.unit}</span>
                    </div>
                    <div class="status-badge ${badgeClass}">${badgeText}</div>
                </div>`;
            }).join('');

            const callBtn = document.getElementById('callRobotBtn');
            if (callBtn && !robotCalled) {
                callBtn.disabled = !dataReceived;
                if (!dataReceived) callBtn.innerHTML = '⏳ Waiting for sensors...';
                else callBtn.innerHTML = '🚨 Bring Car To Me';
            }
        }

        // ==========================================
        // DATA POLLING FROM LOCAL PYTHON SERVER
        // ==========================================
        async function fetchServerData() {
            try {
                const response = await fetch(`${API_URL}/data`);
                const dbState = await response.json();

                document.getElementById('apiErrorMsg').style.display = 'none';

                // Check if any real sensor data has bubbled up
                if (dbState.sensors.heartRate !== null || dbState.sensors.temperature !== null || dbState.sensors.ambientTemp !== null) {
                    sensorData = { ...sensorData, ...dbState.sensors };
                    dataReceived = true;
                }

                // Check Robot Status to unlock button if it Returned/Arrived
                if (dbState.car.status === 'ARRIVED' || dbState.car.status === 'IDLE') {
                    if (dbState.car.command === 'IDLE' && robotCalled) {
                        robotCalled = false;
                        const btn = document.getElementById('callRobotBtn');
                        if (btn) {
                            btn.classList.remove('active');
                            btn.innerHTML = '🚨 Bring Car To Me';
                            btn.disabled = false;
                        }
                        const alertBanner = document.getElementById('globalAlert');
                        if (alertBanner) alertBanner.classList.remove('active');
                    }
                }

                updateDashboardUI();
            } catch (error) {
                document.getElementById('apiErrorMsg').style.display = 'block';
                console.error("Local Server Polling failed - is server.py running?", error);
            }
        }

        // Skip Login Screen, Go Straight to Dashboard!
        renderDashboard();
        // Poll every 1 second
        pollInterval = setInterval(fetchServerData, 1000);
    </script>
</body>

</html>
